services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: printerhub
      POSTGRES_USER: printerhub
      POSTGRES_PASSWORD: printerhub
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U printerhub -d printerhub"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    image: vpshukin/printerhub-backend:latest
    environment:
      DATABASE_URL: postgresql+psycopg://printerhub:printerhub@db:5432/printerhub
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()\""]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s

  frontend:
    image: vpshukin/printerhub-frontend:latest
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"

volumes:
  pgdata: