name: CD (GHCR)

on:
  push:
    branches: ["main"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - service: backend
            context: ./backend
            image: printerhub-backend
          - service: frontend
            context: ./frontend
            image: printerhub-frontend

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Compute lowercase owner
        id: vars
        shell: bash
        run: |
          OWNER="${GITHUB_REPOSITORY%%/*}"
          echo "owner_lc=${OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ghcr.io/${{ steps.vars.outputs.owner_lc }}/${{ matrix.image }}:latest
            ghcr.io/${{ steps.vars.outputs.owner_lc }}/${{ matrix.image }}:${{ github.sha }}